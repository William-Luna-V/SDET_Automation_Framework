name: E2E Regression Tests

on: 
  push:
    branches: [main]
    paths:
      - '01-Gaps-Multienv/**' 
      - '02-java-sdet-framework/**' 
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gaps-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        
      - name: Instalar Dependencias
        run:  |
          python -m pip install --upgrade pip
          if [ -f 01-Gaps-Multienv/requirements.txt ]; then pip install -r 01-Gaps-Multienv/requirements.txt; else pip install pytest python-dotenv; fi

      - name: Ejecutar Tests en QA (Por Defecto)
        env:
          ENV: qa
          BASE_URL: https://api.github.com/emojis
          API_TOKEN: ${{ secrets.QA_API_TOKEN }}
        run: python -m pytest -v -s

  java-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y probar con Maven
        run:  |
          if [ -f 02-java-sdet-framework/pom.xml ]; then mvn -f 02-java-sdet-framework/pom.xml clean test; else mvn clean test; fi
